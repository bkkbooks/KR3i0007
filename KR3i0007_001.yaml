body:
  text: 硯譜李後主硯李後主留意筆札所用澄心堂紙李廷珪墨龍尾石硯三者為天下之冠右軍風字硯會稽有老叟云右軍之後持一風字硯大尺餘色正赤用之不減端石云右軍所用者石揚休以錢二萬得之紅絲石青州紅絲石外有皮表磨礱即其理紅黄相參理黄者其絲紅理紅者其絲黄須飲以水使足乃可用不然渇燥唐彦猷甚竒此硯以為發墨不減端石蔡君謨又言端石瑩潤惟有鋩者尤發墨歙石多鋩惟膩者佳葢物之竒者必異其類也鳯咮石蘇子瞻云僕好鳯咮石少得真者唐彦猷以青州紅絲石為甲或云唯堪作骰盆端硯蘇公易簡云柳公權論硯青州石為第一絳州者次之殊不言端石世傳端溪中有草蒙茸可愛匠琢石成硯用草褁之故自嶺表迄中夏而無損或云水中石其色青山半石其色紫山絶頂者尤潤如豬肝色者佳其貯水處有白赤黄色㸃者謂之鸜鵒眼脉理黄者謂之金線紋其山號斧柯昔人採石為硯必中牢祭之不爾雷電失石所在鸜鵒眼端石有眼者最貴謂之鸜鵒眼石紋精美如木有節今不知者乃以為石病吁可痛哉石有上下巖西坑後厯悉其下也惟上巖有眼眼之美者青黄緑三色相重多者自外至心凡九重其大者尤為希有或布列硯中如北斗心房之形土人以眼多少為價重輕其生於墨池之外者謂之髙眼生於内者曰低眼髙眼尤可尚以不為墨漬常可睹也或云取石祭以中牢故老云無之又云石有金線為美正其病也唐彦猷子石端石以子石為上在大石中生葢精石也流俗訛為紫石又以貯水不耗為佳有眼為貴眼石病也官司歳以為貢在他硯上然十無一二發墨者但充翫好而已歐陽永叔端溪端溪有斧柯茶園將軍地同是一溪唯斧柯出者大不過三四指一兩呵津汗滴瀝真難得之物茶園次之將軍又次之鄭樵活眼死眼蘇易簡作文房四譜譜言四寳硯為首筆墨兼紙皆可隨時收索可與終身俱者唯硯而已譜中載四十餘品以青州紅絲石為一斧柯山第二龍尾石第三餘皆在中下雖銅雀臺古瓦硯列於下品特存古物耳端所出有四巖石為甲石屋次之西坑又次之後厯為劣巖與西坑相去二十里石屋後厯七里而所産逈然不同猶建安産茶北源壑源去沙溪十數里而優劣差殊而巖石又分上下又有活眼死眼之别圓暈相重黄黒相間繄精在内晶瑩可愛謂之活眼四旁浸漬不甚鮮明謂之淚眼形體略具内外皆白殊無光彩謂之死眼活眼勝淚眼淚眼勝死眼死眼勝無眼龍尾石歙石出於龍尾溪以金星為貴予少時得金坑礦石堅而發墨端溪以北巖為上龍尾以深為上龍尾更在端溪上而端石以後出見貴爾歐陽永叔李賀詩永叔以端溪後出不然李賀有端州青花石硯詩云暗洒萇𢎞冷血痕則謂鸜鵒眼知端石為硯久矣諸州硯淄州金雀石色紺青聲如金玉又有青金石叩之無聲發墨青州紫金石狀類端州西坑石發墨過之吉州缺縣紫石亦類西坑登州駞基島石上有羅紋金星絳州角石色如白牛角歸州大沱石江水中石也止用於川峽人宿州出樂石潤膩發墨但無石脉萬州有懸金崖石又有磁洞石洮河出緑石性腝不起墨不耐久磨牢山丹石滑澤堅膩古瓦硯出相州魏銅雀臺里人因掘土往往得之虢州澄泥唐人品硯以為第一今人罕用潭州道人吕翁作澄泥硯堅重如石手觸輒生暈上著吕字青維州石末硯皆瓦硯也柳公權以為第一當時未見歙石以為上品耳硯賦傅𤣥硯賦云木貴其能軟石美其潤堅劉道友以浮查為硯知吉亦有木硯銅硯蜯硯劉聰謂晉懷帝曰頃贈朕柘木銅硯袁彖贈庾翼蜯硯水精硯丁恕有水精硯大纔四寸許為風字樣用墨即不出光發墨如歙石玉硯鎮潼留後李充伯得玉材琢為圓硯發墨可愛碧玉硯許漢陽筆以白玉為管硯乃碧玉以玻瓈為匣鐵硯青州熟鐵硯甚發墨有柄可執晉桑維翰鑄生鐵硯漆硯晉儀注太子納妃有漆硯竹硯異物志云廣南以竹為硯滌硯几硯須旦滌之縱未能亦須日易其水洗宜用小氊片或紙若久用石色為墨漬汚即以麩炭磨洗復如新矣苦寒不宜用佳硯石理既凍墨亦少光帝鴻氏之硯黄帝得玉一紐治為墨海其上篆文曰帝鴻氏之硯又太公金匱硯書曰石墨相著而黒邪心讒言無得汚白是知硯其來尚矣硯者研也可研墨使和濡也孔子硯伍緝之從征記云魯國孔子廟中石硯一枚甚古朴孔子平生時物也又顔路所請者車亦存硯溪永嘉郡記云硯溪一源多石硯述異記云洞庭湖一陂有范蠡石牀石硯一篋磨穴硯古人有學書於人者數年自以藝成告而辭去師曰吾有一篋物可附於某處及山之下絶無所付人封題亦甚不密乃啓之皆磨穴者硯數十枚方知師夙所用者乃返山服膺至皓首方畢其藝補百碎硯石晉時闗右有李處士能畫馴狸能補端硯百碎者賫歸旬日即復舊如新琢成畧無瑕纇世莫得其法後主青石硯李後主得青石硯墨池中有黄石如彈丸水常滿終日用之不耗每以自隨後歸朝陶穀見而異之硯大不可持乃取石彈丸去後主拽其手振臂就取後主請以寳玩為謝陶不許後主曰唯此硯能生水他硯皆不可用陶試數十硯水皆不生後主索之良苦陶不能奈曰要當碎之石破中有小魚跳地上即死自是硯無復潤澤真材本性硯當用石鏡當用銅此真材本性也以瓦為硯如以鐵為鏡耳謝銅硯筆格啓庾肩吾謝銅硯筆格啓云煙磨青石已踐孔子之壇管插銅龍還笑王生之壁石硯賦黎逢石硯賦云琢而磨之其滑如砥欲研精而染翰在虚中而貯水水隨暈而還周墨浮光而黛起明而未融是以為用久而不渝故以為美成器尚古徴闕里於素王匠法増華參㑹稽之内史又云一拳之石取其堅一勺之水取其浄又云對此大匠厠諸鴻筆見珍於殺青之晨為用於草𤣥之日硯詩僧貫休硯詩云低心蒙潤久入匣更身安石虚中傳文嵩石虚中傳云石虚中字居黙器度方圓中心坦然若汪汪萬頃之量封即墨侯與宣城毛元銳燕人易𤣥光華隂禇知白皆同出處硯譜
